# Cava config for Waybar raw output pipe — do not use for standalone cava

[general]
bars = 8
bar_width = 1
bar_spacing = 0
framerate = 30
autosens = 1
sensitivity = 150
lower_cutoff_freq = 50
higher_cutoff_freq = 10000

[output]
method = raw
raw_target = /dev/stdout
bit_format = 8bit
channels = mono

[smoothing]
monstercat = 1
waves = 0
noise_reduction = 0.88
